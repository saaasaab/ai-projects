<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Circle on a Table (Viewed at an Angle)</title>
  <style>
    :root{
      --bg: #0b0f1a;
      --panel: rgba(255,255,255,0.06);
      --panel2: rgba(255,255,255,0.08);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.65);
      --stroke: rgba(255,255,255,0.18);
      --shadow: rgba(0,0,0,0.45);
      --accent: #9ad1ff;
    }

    *{ box-sizing: border-box; }
    body{
      margin:0;
      min-height:100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background: radial-gradient(1200px 800px at 70% 20%, #12223f 0%, #0b0f1a 55%, #070914 100%);
      color: var(--text);
      display:grid;
      place-items:center;
      padding: 28px 18px;
    }

    .wrap{
      width: min(980px, 100%);
      display:grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .stage{
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 18px;
      background:
        radial-gradient(900px 420px at 50% 45%, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.04) 35%, rgba(255,255,255,0.02) 55%, rgba(255,255,255,0.00) 75%),
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 30px 90px rgba(0,0,0,0.35);
      display:grid;
      place-items:center;
      overflow:hidden;
      position: relative;
    }

    canvas{
      width: 100%;
      height: 100%;
      display:block;
    }

    .controls{
      border-radius: 18px;
      background: linear-gradient(180deg, var(--panel), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 18px 60px rgba(0,0,0,0.25);
      padding: 14px 14px 10px;
      display:grid;
      gap: 10px;
    }

    .title{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap: 10px;
      padding: 2px 2px 8px;
    }

    .title h1{
      font-size: 14px;
      margin:0;
      font-weight: 650;
      letter-spacing: 0.2px;
    }

    .title .hint{
      font-size: 12px;
      color: var(--muted);
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .row{
      display:grid;
      grid-template-columns: 140px 1fr 84px;
      gap: 10px;
      align-items:center;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .row label{
      font-size: 12px;
      color: var(--muted);
      user-select:none;
    }

    .val{
      font-variant-numeric: tabular-nums;
      text-align:right;
      font-size: 12px;
      color: rgba(255,255,255,0.82);
    }

    input[type="range"]{
      width:100%;
      accent-color: var(--accent);
    }

    .toggles{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .toggle{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      padding: 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted);
      font-size: 12px;
      user-select:none;
    }

    .toggle input{ transform: translateY(1px); }

    .footer{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap: 10px;
      padding: 2px 2px 0;
      color: var(--muted);
      font-size: 12px;
    }

    .btn{
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.88);
      border-radius: 10px;
      padding: 8px 10px;
      cursor:pointer;
      font-size: 12px;
    }

    .btn:active{ transform: translateY(1px); }

    @media (min-width: 880px){
      .wrap{ grid-template-columns: 1.6fr 1fr; align-items: stretch; }
      .controls{ height: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="stage" aria-label="Canvas stage">
      <canvas id="c"></canvas>
    </div>

    <div class="controls" aria-label="Controls">
      <div class="title">
        <h1>Circle flat on a table (camera tilt)</h1>
        <div class="hint">Adjust radius + tilt angle</div>
      </div>

      <div class="grid">
        <div class="row">
          <label for="radius">Circle radius</label>
          <input id="radius" type="range" min="40" max="360" value="190" step="1" />
          <div class="val"><span id="radiusVal">190</span> px</div>
        </div>

        <div class="row">
          <label for="tilt">View angle (tilt)</label>
          <input id="tilt" type="range" min="0" max="85" value="45" step="1" />
          <div class="val"><span id="tiltVal">45</span>°</div>
        </div>

        <div class="row">
          <label for="spin">Spin (yaw)</label>
          <input id="spin" type="range" min="0" max="360" value="-20" step="1" />
          <div class="val"><span id="spinVal">-20</span>°</div>
        </div>

        <div class="row">
          <label for="lift">Lift (pixels)</label>
          <input id="lift" type="range" min="-120" max="180" value="10" step="1" />
          <div class="val"><span id="liftVal">10</span> px</div>
        </div>

        <div class="toggles">
          <label class="toggle" title="Adds a subtle inner highlight to suggest a disk surface">
            Surface shading
            <input id="shade" type="checkbox" checked />
          </label>
          <label class="toggle" title="Draws major/minor axes guides (for debugging)">
            Show axes
            <input id="axes" type="checkbox" />
          </label>
        </div>

        <div class="footer">
          <button id="reset" class="btn">Reset</button>
          <span>Model: circle → ellipse via perspective tilt</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Standalone: no deps.
    // We model a circle lying flat (in the XZ plane). When the camera tilts downward by angle θ,
    // the projected shape becomes an ellipse with minor axis scaled by cos(θ).

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    const $ = (id) => document.getElementById(id);

    const inputs = {
      radius: $('radius'),
      tilt: $('tilt'),
      spin: $('spin'),
      lift: $('lift'),
      shade: $('shade'),
      axes: $('axes'),
      reset: $('reset'),
    };

    const labels = {
      radiusVal: $('radiusVal'),
      tiltVal: $('tiltVal'),
      spinVal: $('spinVal'),
      liftVal: $('liftVal'),
    };

    const defaults = {
      radius: 190,
      tilt: 45,
      spin: -20,
      lift: 10,
      shade: true,
      axes: false,
    };

    function fitCanvasToCSS(){
      const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
      const { width, height } = canvas.getBoundingClientRect();
      const w = Math.max(1, Math.floor(width * dpr));
      const h = Math.max(1, Math.floor(height * dpr));
      if (canvas.width !== w || canvas.height !== h){
        canvas.width = w;
        canvas.height = h;
      }
      ctx.setTransform(1,0,0,1,0,0);
      ctx.scale(dpr, dpr);
    }

    function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }

    function degToRad(d){ return d * Math.PI / 180; }

    function draw(){
      fitCanvasToCSS();

      const W = canvas.getBoundingClientRect().width;
      const H = canvas.getBoundingClientRect().height;

      // Read inputs
      const R = Number(inputs.radius.value);
      const tiltDeg = Number(inputs.tilt.value);
      const spinDeg = Number(inputs.spin.value);
      const lift = Number(inputs.lift.value);
      const shading = !!inputs.shade.checked;
      const showAxes = !!inputs.axes.checked;

      labels.radiusVal.textContent = String(R);
      labels.tiltVal.textContent = String(tiltDeg);
      labels.spinVal.textContent = String(spinDeg);
      labels.liftVal.textContent = String(lift);

      // Background (stage already has a bg; keep canvas transparent-ish)
      ctx.clearRect(0, 0, W, H);

      // Ellipse parameters
      const tilt = degToRad(clamp(tiltDeg, 0, 89.9));
      const spin = degToRad(spinDeg);

      // Major axis = R, minor axis = R * cos(tilt)
      const a = R;
      const b = R * Math.cos(tilt);

      // Center
      const cx = W * 0.5;
      const cy = H * 0.55 - lift;

      // Soft shadow under the disk (still an ellipse; slightly larger and lower)
      const shadowOffsetY = 18 + (tiltDeg * 0.15);
      ctx.save();
      ctx.translate(cx, cy + shadowOffsetY);
      ctx.rotate(spin);
      ctx.scale(1, 1);
      const shadowBlur = 22 + tiltDeg * 0.35;
      ctx.filter = `blur(${shadowBlur}px)`;
      ctx.globalAlpha = 0.65;
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ellipsePath(ctx, 0, 0, a * 0.92, b * 0.92);
      ctx.fill();
      ctx.restore();

      // Disk
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(spin);

      // Outer ring
      ctx.lineWidth = 2;
      ctx.strokeStyle = 'rgba(255,255,255,0.22)';
      ctx.fillStyle = 'rgba(170, 220, 255, 0.14)';
      ellipsePath(ctx, 0, 0, a, b);
      ctx.fill();
      ctx.stroke();

      // Rim highlight
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = 'rgba(255,255,255,0.28)';
      ellipsePath(ctx, 0, -1, a * 0.985, b * 0.985);
      ctx.stroke();

      // Subtle surface shading (radial-ish, faked with gradient in ellipse space)
      if (shading){
        // Create a gradient in local space, then clip to ellipse.
        ctx.save();
        ellipsePath(ctx, 0, 0, a, b);
        ctx.clip();

        // A pseudo radial gradient: brighter near upper-left.
        const g = ctx.createRadialGradient(-a*0.35, -b*0.45, 2, 0, 0, Math.max(a, b));
        g.addColorStop(0.0, 'rgba(255,255,255,0.28)');
        g.addColorStop(0.35, 'rgba(255,255,255,0.10)');
        g.addColorStop(1.0, 'rgba(0,0,0,0.10)');
        ctx.fillStyle = g;
        ctx.globalAlpha = 1;
        ctx.fillRect(-a-2, -b-2, (a+2)*2, (b+2)*2);

        // Slight vignette
        const g2 = ctx.createRadialGradient(0, 0, Math.max(6, b*0.2), 0, 0, Math.max(a, b));
        g2.addColorStop(0.0, 'rgba(0,0,0,0)');
        g2.addColorStop(1.0, 'rgba(0,0,0,0.14)');
        ctx.fillStyle = g2;
        ctx.fillRect(-a-2, -b-2, (a+2)*2, (b+2)*2);

        ctx.restore();
      }

      // Optional axes
      if (showAxes){
        ctx.save();
        ctx.setLineDash([6,6]);
        ctx.lineWidth = 1;
        ctx.strokeStyle = 'rgba(255,255,255,0.28)';
        // Major axis
        ctx.beginPath();
        ctx.moveTo(-a, 0);
        ctx.lineTo(a, 0);
        ctx.stroke();
        // Minor axis
        ctx.beginPath();
        ctx.moveTo(0, -b);
        ctx.lineTo(0, b);
        ctx.stroke();

        ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(255,255,255,0.70)';
        ctx.font = '12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial';
        ctx.fillText('major', a - 40, -8);
        ctx.fillText('minor', 8, -b + 14);
        ctx.restore();
      }

      ctx.restore();

      // Label in corner (tiny)
      ctx.save();
      ctx.globalAlpha = 0.75;
      ctx.fillStyle = 'rgba(255,255,255,0.70)';
      ctx.font = '12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial';
      ctx.fillText(`Ellipse: a = ${Math.round(a)}px, b = ${Math.round(b)}px (b = a·cos(tilt))`, 16, 22);
      ctx.restore();
    }

    function ellipsePath(ctx, x, y, rx, ry){
      ctx.beginPath();
      // Use native ellipse if available
      if (ctx.ellipse){
        ctx.ellipse(x, y, Math.max(0.001, rx), Math.max(0.001, ry), 0, 0, Math.PI * 2);
        return;
      }
      // Fallback: approximate with Beziers
      const k = 0.5522847498307936;
      const ox = rx * k;
      const oy = ry * k;
      ctx.moveTo(x - rx, y);
      ctx.bezierCurveTo(x - rx, y - oy, x - ox, y - ry, x, y - ry);
      ctx.bezierCurveTo(x + ox, y - ry, x + rx, y - oy, x + rx, y);
      ctx.bezierCurveTo(x + rx, y + oy, x + ox, y + ry, x, y + ry);
      ctx.bezierCurveTo(x - ox, y + ry, x - rx, y + oy, x - rx, y);
      ctx.closePath();
    }

    function bind(){
      const redraw = () => draw();
      for (const el of [inputs.radius, inputs.tilt, inputs.spin, inputs.lift]){
        el.addEventListener('input', redraw);
      }
      inputs.shade.addEventListener('change', redraw);
      inputs.axes.addEventListener('change', redraw);

      inputs.reset.addEventListener('click', () => {
        inputs.radius.value = String(defaults.radius);
        inputs.tilt.value = String(defaults.tilt);
        inputs.spin.value = String(defaults.spin);
        inputs.lift.value = String(defaults.lift);
        inputs.shade.checked = defaults.shade;
        inputs.axes.checked = defaults.axes;
        draw();
      });

      window.addEventListener('resize', () => draw(), { passive: true });
    }

    bind();
    draw();
  </script>
</body>
</html>
