<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ink Splatter Simulator</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #f4f4f4;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #222;
      overflow: hidden;
    }
    #ui {
      position: fixed;
      top: 12px;
      left: 12px;
      background: rgba(255, 255, 255, 0.9);
      padding: 10px 14px;
      border-radius: 10px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
      z-index: 10;
      font-size: 13px;
    }
    #ui button {
      border: none;
      padding: 6px 10px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
      margin-right: 6px;
    }
    #generateBtn {
      background: #111;
      color: #fff;
    }
    #clearBtn {
      background: #ddd;
    }
    #animateBtn {
      background: #4a90e2;
      color: #fff;
    }
    #animateBtn.active {
      background: #2d6ba3;
    }
    #mode3DBtn {
      background: #e67e22;
      color: #fff;
    }
    #mode3DBtn.active {
      background: #d35400;
    }
    #recordBtn {
      background: #e74c3c;
      color: #fff;
    }
    #recordBtn.active {
      background: #c0392b;
    }
    #ui label {
      margin-right: 6px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    #ui input[type="range"] {
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div style="margin-bottom:6px;">
      <button id="generateBtn">New Splatter</button>
      <button id="clearBtn">Clear</button>
      <button id="animateBtn">Animate</button>
      <button id="mode3DBtn">3D</button>
      <button id="recordBtn">Record</button>
      <select id="aspectRatioSelect" style="margin-left:6px; padding:6px 8px; border-radius:4px; border:1px solid #ddd; font-size:12px;">
        <option value="16:9">16:9</option>
        <option value="9:16">9:16</option>
      </select>
    </div>
    <div>
      <label>
        Density
        <input id="densitySlider" type="range" min="0" max="1" step="0.01" value="0.6" />
      </label>
      <label>
        Spread
        <input id="spreadSlider" type="range" min="0" max="1" step="0.01" value="0.7" />
      </label>
    </div>
    <div style="margin-top:6px;">
      <label>
        Curvature
        <input id="curvatureSlider" type="range" min="-1" max="1" step="0.01" value="0.5" />
      </label>
      <label>
        Anim Speed
        <input id="speedSlider" type="range" min="0.1" max="3" step="0.05" value="1" />
      </label>
    </div>
    <div style="margin-top:6px;">
      <label>
        Branch Thickness
        <input id="branchThicknessSlider" type="range" min="0.3" max="2" step="0.05" value="1" />
      </label>
    </div>
    <div style="margin-top:4px; opacity:0.7;">
      Click the canvas or press <b>space</b> for more splatters.
    </div>
    <div style="margin-top:8px; padding-top:8px; border-top:1px solid rgba(0,0,0,0.1);">
      <label style="display:block; margin-bottom:4px;">
        Seed (copy to save):
        <input id="seedInput" type="text" readonly style="width:100%; margin-top:2px; padding:4px; font-family:monospace; font-size:11px; background:#f5f5f5;" />
      </label>
      <label style="display:block; margin-top:4px;">
        Load Seed:
        <input id="loadSeedInput" type="text" placeholder="Paste seed here" style="width:100%; margin-top:2px; padding:4px; font-family:monospace; font-size:11px;" />
      </label>
      <button id="loadSeedBtn" style="margin-top:4px; padding:4px 8px; width:100%;">Load Seed</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ccapture.js@1.1.0/build/CCapture.all.min.js"></script>
  <script>
    let densitySlider, spreadSlider, curvatureSlider, speedSlider, branchThicknessSlider;
    let lastSplatterCenter = { cx: undefined, cy: undefined };
    let isAnimating = false;
    let splatterData = null;
    let animationTime = 0;
    let currentSeedData = null; // Contains: {seed: number, density, spread, curvature, speed, branchThickness}
    let is3DMode = false;
    let rotation3D = 0;
    let isRecording = false;
    let capturer = null;
    let recordFrameCount = 0;
    const RECORD_FPS = 30;
    const ROTATION_SPEED = 0.01; // radians per frame
    let originalCanvasWidth = 0;
    let originalCanvasHeight = 0;
    let recordingAspectRatio = '16:9'; // '16:9' or '9:16'

    function setup() {
      createCanvas(window.innerWidth, window.innerHeight);
      pixelDensity(1);
      background(245);

      densitySlider = document.getElementById('densitySlider');
      spreadSlider = document.getElementById('spreadSlider');
      curvatureSlider = document.getElementById('curvatureSlider');
      speedSlider = document.getElementById('speedSlider');
      branchThicknessSlider = document.getElementById('branchThicknessSlider');

      document.getElementById('loadSeedBtn').onclick = () => {
        const seedStr = document.getElementById('loadSeedInput').value.trim();
        if (seedStr) {
          try {
            // Try parsing as JSON first (new format)
            const seedData = JSON.parse(seedStr);
            if (seedData.seed !== undefined) {
              // Restore all slider settings before setting currentSeedData
              if (seedData.density !== undefined) densitySlider.value = seedData.density;
              if (seedData.spread !== undefined) spreadSlider.value = seedData.spread;
              if (seedData.curvature !== undefined) curvatureSlider.value = seedData.curvature;
              if (seedData.speed !== undefined) speedSlider.value = seedData.speed;
              if (seedData.branchThickness !== undefined) branchThicknessSlider.value = seedData.branchThickness;
              
              // Update seed data with restored slider values
              currentSeedData = {
                seed: seedData.seed,
                density: parseFloat(densitySlider.value),
                spread: parseFloat(spreadSlider.value),
                curvature: parseFloat(curvatureSlider.value),
                speed: parseFloat(speedSlider.value),
                branchThickness: parseFloat(branchThicknessSlider.value)
              };
              
              isAnimating = false;
              document.getElementById('animateBtn').classList.remove('active');
              generateSplatter();
            } else {
              alert('Invalid seed format. Missing seed value.');
            }
          } catch (e) {
            // Try old format (just a number) for backwards compatibility
            try {
              const seed = parseInt(seedStr, 10);
              if (!isNaN(seed)) {
                currentSeedData = { 
                  seed: seed,
                  density: parseFloat(densitySlider.value),
                  spread: parseFloat(spreadSlider.value),
                  curvature: parseFloat(curvatureSlider.value),
                  speed: parseFloat(speedSlider.value),
                  branchThickness: parseFloat(branchThicknessSlider.value)
                };
                isAnimating = false;
                document.getElementById('animateBtn').classList.remove('active');
                generateSplatter();
              } else {
                alert('Invalid seed format. Please enter a valid JSON string or number.');
              }
            } catch (e2) {
              alert('Invalid seed format. Please enter a valid JSON string or number.');
            }
          }
        }
      };

      document.getElementById('generateBtn').onclick = () => {
        currentSeedData = null; // Generate new seed
        isAnimating = false;
        document.getElementById('animateBtn').classList.remove('active');
        generateSplatter();
      };
      document.getElementById('clearBtn').onclick = () => {
        background(245);
        lastSplatterCenter = { cx: undefined, cy: undefined };
        splatterData = null;
        isAnimating = false;
        document.getElementById('animateBtn').classList.remove('active');
      };

      const animateBtn = document.getElementById('animateBtn');
      animateBtn.onclick = () => {
        isAnimating = !isAnimating;
        if (isAnimating) {
          animateBtn.classList.add('active');
          animationTime = 0; // Reset animation time
          if (!splatterData) {
            generateSplatter();
          }
        } else {
          animateBtn.classList.remove('active');
          // Redraw static version
          background(245);
          if (splatterData) {
            drawSplatter(splatterData, 0);
          }
        }
      };

      const mode3DBtn = document.getElementById('mode3DBtn');
      mode3DBtn.onclick = () => {
        is3DMode = !is3DMode;
        if (is3DMode) {
          mode3DBtn.classList.add('active');
          rotation3D = 0;
        } else {
          mode3DBtn.classList.remove('active');
        }
        // Redraw
        background(245);
        if (splatterData) {
          const currentTime = isAnimating ? animationTime : 0;
          drawSplatter(splatterData, currentTime);
        }
      };

      const aspectRatioSelect = document.getElementById('aspectRatioSelect');
      aspectRatioSelect.onchange = () => {
        recordingAspectRatio = aspectRatioSelect.value;
      };

      const recordBtn = document.getElementById('recordBtn');
      recordBtn.onclick = () => {
        if (!isRecording) {
          // Save original canvas size
          originalCanvasWidth = width;
          originalCanvasHeight = height;
          
          // Set canvas to recording aspect ratio
          let recordWidth, recordHeight;
          const baseSize = 1920; // Use 1920 as base for good quality
          if (recordingAspectRatio === '16:9') {
            recordWidth = baseSize;
            recordHeight = baseSize * 9 / 16;
          } else { // 9:16
            recordWidth = baseSize * 9 / 16;
            recordHeight = baseSize;
          }
          resizeCanvas(recordWidth, recordHeight);
          
          // Generate or regenerate splatter with new canvas center (keeps same seed if already generated)
          generateSplatter();
          
          // Start recording
          isRecording = true;
          recordBtn.classList.add('active');
          recordBtn.textContent = 'Recording...';
          recordFrameCount = 0;
          rotation3D = 0; // Reset rotation to start from beginning
          
          // Initialize CCapture for WebM video
          capturer = new CCapture({
            format: 'webm',
            framerate: RECORD_FPS,
            quality: 90,
            name: 'ink-blot-animation'
          });
          capturer.start();
          
          // Ensure 3D mode is enabled and animation is running for recording
          if (!is3DMode) {
            is3DMode = true;
            mode3DBtn.classList.add('active');
          }
          if (!isAnimating) {
            isAnimating = true;
            animateBtn.classList.add('active');
            animationTime = 0;
          }
        } else {
          // Stop recording
          isRecording = false;
          recordBtn.classList.remove('active');
          recordBtn.textContent = 'Record';
          capturer.stop();
          capturer.save();
          capturer = null;
          
          // Restore original canvas size
          resizeCanvas(originalCanvasWidth, originalCanvasHeight);
          background(245);
          if (splatterData) {
            const currentTime = isAnimating ? animationTime : 0;
            drawSplatter(splatterData, currentTime);
          }
        }
      };

      // Live updates on slider change
      densitySlider.addEventListener('input', () => {
        // Keep the same seed, just update the slider value in seed data
        if (currentSeedData) {
          currentSeedData.density = parseFloat(densitySlider.value);
        }
        isAnimating = false;
        animateBtn.classList.remove('active');
        background(245);
        generateSplatter(lastSplatterCenter.cx, lastSplatterCenter.cy);
      });
      spreadSlider.addEventListener('input', () => {
        // Keep the same seed, just update the slider value in seed data
        if (currentSeedData) {
          currentSeedData.spread = parseFloat(spreadSlider.value);
        }
        isAnimating = false;
        animateBtn.classList.remove('active');
        background(245);
        generateSplatter(lastSplatterCenter.cx, lastSplatterCenter.cy);
      });
      curvatureSlider.addEventListener('input', () => {
        // Keep the same seed, just update the slider value in seed data
        if (currentSeedData) {
          currentSeedData.curvature = parseFloat(curvatureSlider.value);
        }
        isAnimating = false;
        animateBtn.classList.remove('active');
        background(245);
        generateSplatter(lastSplatterCenter.cx, lastSplatterCenter.cy);
      });
      branchThicknessSlider.addEventListener('input', () => {
        // Branch thickness can update live without regenerating
        if (splatterData) {
          background(245);
          const currentTime = isAnimating ? animationTime : 0;
          drawSplatter(splatterData, currentTime);
        }
      });

      // Generate initial splatter
      generateSplatter();
    }

    function windowResized() {
      resizeCanvas(window.innerWidth, window.innerHeight);
      background(245);
      if (splatterData) {
        const currentTime = isAnimating ? animationTime : 0;
        drawSplatter(splatterData, currentTime);
      }
    }

    function draw() {
      // Update 3D rotation if in 3D mode
      if (is3DMode) {
        rotation3D += ROTATION_SPEED;
      }
      
      if (isAnimating && splatterData) {
        const speed = parseFloat(speedSlider.value);
        animationTime += 0.02 * speed;
        background(245);
        drawSplatter(splatterData, animationTime);
      } else if (is3DMode && splatterData) {
        // Redraw in 3D mode even when not animating
        background(245);
        drawSplatter(splatterData, 0);
      }
      
      // Capture frame for video recording
      if (isRecording && capturer) {
        capturer.capture(canvas.elt);
        recordFrameCount++;
        
        // Auto-stop after one full rotation
        // One full rotation = TWO_PI radians, at ROTATION_SPEED per frame
        const framesPerRotation = TWO_PI / ROTATION_SPEED;
        if (recordFrameCount >= framesPerRotation) {
          isRecording = false;
          const recordBtn = document.getElementById('recordBtn');
          recordBtn.classList.remove('active');
          recordBtn.textContent = 'Record';
          capturer.stop();
          capturer.save();
          capturer = null;
          
          // Restore original canvas size
          resizeCanvas(originalCanvasWidth, originalCanvasHeight);
          background(245);
          if (splatterData) {
            const currentTime = isAnimating ? animationTime : 0;
            drawSplatter(splatterData, currentTime);
          }
        }
      }
    }

    function mousePressed() {
      // Ignore clicks on the UI panel
      const ui = document.getElementById('ui').getBoundingClientRect();
      if (
        mouseX >= ui.left && mouseX <= ui.right &&
        mouseY >= ui.top && mouseY <= ui.bottom
      ) return;

      currentSeedData = null; // Generate new seed on click
      isAnimating = false;
      document.getElementById('animateBtn').classList.remove('active');
      generateSplatter(mouseX, mouseY);
    }

    function keyPressed() {
      if (key === ' ') {
        currentSeedData = null; // Generate new seed on space
        isAnimating = false;
        document.getElementById('animateBtn').classList.remove('active');
        generateSplatter();
        return false; // prevent page scroll
      }
    }

    function generateSplatter(cx, cy) {
      // Generate or use seed data
      if (currentSeedData === null) {
        // Generate new seed with current slider values
        const seed = floor(random(1000000, 9999999));
        const density = parseFloat(densitySlider.value);
        const spread = parseFloat(spreadSlider.value);
        const curvature = parseFloat(curvatureSlider.value);
        const speed = parseFloat(speedSlider.value);
        const branchThickness = parseFloat(branchThicknessSlider.value);
        
        currentSeedData = {
          seed: seed,
          density: density,
          spread: spread,
          curvature: curvature,
          speed: speed,
          branchThickness: branchThickness
        };
      } else {
        // If we have seed data, update it with current slider values
        // (Don't restore slider values here - that only happens when loading a seed)
        // Slider event listeners already update currentSeedData when user changes sliders
        currentSeedData.density = parseFloat(densitySlider.value);
        currentSeedData.spread = parseFloat(spreadSlider.value);
        currentSeedData.curvature = parseFloat(curvatureSlider.value);
        currentSeedData.speed = parseFloat(speedSlider.value);
        currentSeedData.branchThickness = parseFloat(branchThicknessSlider.value);
      }
      
      randomSeed(currentSeedData.seed);
      
      // Get current slider values for generation
      let density = parseFloat(densitySlider.value); // 0–1
      let spread  = parseFloat(spreadSlider.value);  // 0–1
      let curvatureMultiplier = parseFloat(curvatureSlider.value); // 0–1
      
      // Update seed display with JSON string (seed data already has current values)
      document.getElementById('seedInput').value = JSON.stringify(currentSeedData);
      
      // Center defaults to middle of page
      if (cx === undefined || cy === undefined) {
        cx = width * 0.5;
        cy = height * 0.5;
      }
      
      // Store the center for live updates
      lastSplatterCenter = { cx, cy };

      const baseRays       = 6;
      const extraRays      = int(16 * density);
      const rayCount       = baseRays + extraRays;

      // More variable arm lengths - wider range
      const minLen         = 50;
      const maxLen         = 350 + spread * 200;

      const mainBlotRadius = 15 + density * 5; // Bigger center splatter

      // Build splatter data structure
      splatterData = {
        cx, cy,
        mainBlotRadius,
        density,
        spread,
        maxLen,
        curvatureMultiplier,
        rays: []
      };

      // Generate rays data in 3D spherical coordinates
      for (let i = 0; i < rayCount; i++) {
        // Spherical coordinates: theta (azimuth 0-2π), phi (elevation 0-π)
        // phi = 0 is top of sphere, phi = π is bottom, phi = π/2 is equator
        const theta = random(TWO_PI); // Azimuth angle (around the sphere)
        const phi = acos(random(-1, 1)); // Elevation angle (uniform distribution on sphere)
        const len = random(minLen, maxLen);
        const segments = int(len / 5);

        const baseWidth = map(len, minLen, maxLen, 4, 10) + random(-1.5, 1.5);
        const endWidth = 0.6 + random(-0.3, 0.3);
        const widthVariation = random(0.7, 1.3);
        
        // Store animation parameters (different frequency per ray)
        const animSpeed = random(0.5, 1.2);
        const animPhase = random(TWO_PI);
        const animAmplitude = random(0.15, 0.3);

        // 3D curvature: two perpendicular angles for 3D space
        let curvatureTheta = random(-0.4, 0.4); // Increased curvature range
        let curvaturePhi = random(-0.4, 0.4);
        const raySegments = [];
        const branches = [];

        // Build segments data in 3D space
        for (let s = 0; s < segments; s++) {
          const t = s / segments;
          curvatureTheta += random(-0.15, 0.15); // Increased step size
          curvatureTheta = constrain(curvatureTheta, -0.8, 0.8); // Increased max range
          curvaturePhi += random(-0.15, 0.15);
          curvaturePhi = constrain(curvaturePhi, -0.8, 0.8);
          
          // Curvature increases with distance (t) - make it stronger
          const curvatureIntensity = pow(t, 1.2) * curvatureMultiplier * 2.0; // Increased multiplier
          const baseCurvTheta = curvatureTheta + random(-0.2, 0.2); // Increased variation
          const baseCurvPhi = curvaturePhi + random(-0.2, 0.2);
          const segmentCurvTheta = baseCurvTheta * (0.5 + curvatureIntensity * 2.0); // Stronger curvature
          const segmentCurvPhi = baseCurvPhi * (0.5 + curvatureIntensity * 2.0);
          
          // Calculate current 3D direction in spherical coordinates
          const currentTheta = theta + segmentCurvTheta;
          const currentPhi = phi + segmentCurvPhi;
          
          // Convert to 3D direction vector
          const dirX = sin(currentPhi) * cos(currentTheta);
          const dirY = sin(currentPhi) * sin(currentTheta);
          const dirZ = cos(currentPhi);
          
          // Store 3D direction and position
          raySegments.push({
            t,
            curvatureTheta: segmentCurvTheta,
            curvaturePhi: segmentCurvPhi,
            dirX, dirY, dirZ, // 3D direction vector
            widthVar: 0.9 + random(0, 0.2)
          });

          // Branches in 3D space
          const branchChance = 0.35;
          if (random() < branchChance && s > segments * 0.15) {
            const branchLen = random(10, 50);
            const branchSeg = int(branchLen / 4);
            const branchAngleOffset = random([-1, 1]) * random(0.3, 0.9);
            const branchAnimPhase = random(TWO_PI);
            const branchAnimSpeed = random(0.7, 1.5);
            
            let bCurvatureTheta = random(-0.4, 0.4); // Increased
            let bCurvaturePhi = random(-0.4, 0.4);
            const branchSegments = [];
            for (let bs = 0; bs < branchSeg; bs++) {
              const t2 = bs / branchSeg;
              bCurvatureTheta += random(-0.15, 0.15); // Increased
              bCurvatureTheta = constrain(bCurvatureTheta, -0.6, 0.6);
              bCurvaturePhi += random(-0.15, 0.15);
              bCurvaturePhi = constrain(bCurvaturePhi, -0.6, 0.6);
              
              const branchCurvatureIntensity = pow(t2, 1.2) * curvatureMultiplier * 1.5; // Increased
              const branchBaseCurvTheta = bCurvatureTheta + random(-0.2, 0.2);
              const branchBaseCurvPhi = bCurvaturePhi + random(-0.2, 0.2);
              const branchCurvTheta = branchBaseCurvTheta * (0.6 + branchCurvatureIntensity * 1.5);
              const branchCurvPhi = branchBaseCurvPhi * (0.6 + branchCurvatureIntensity * 1.5);
              
              const branchTheta = currentTheta + branchAngleOffset + branchCurvTheta;
              const branchPhi = currentPhi + branchCurvPhi;
              const branchDirX3D = sin(branchPhi) * cos(branchTheta);
              const branchDirY3D = sin(branchPhi) * sin(branchTheta);
              const branchDirZ3D = cos(branchPhi);
              
              branchSegments.push({
                t: t2,
                curvatureTheta: branchCurvTheta,
                curvaturePhi: branchCurvPhi,
                dirX: branchDirX3D,
                dirY: branchDirY3D,
                dirZ: branchDirZ3D
              });
            }
            
            branches.push({
              segmentIndex: s,
              length: branchLen,
              segments: branchSegments,
              angleOffset: branchAngleOffset,
              animPhase: branchAnimPhase,
              animSpeed: branchAnimSpeed,
              hasDroplet: random() < 0.4,
              dropletSize: random(2, 5)
            });
          }
          
          // Second smaller branch
          if (random() < 0.18 && s > segments * 0.3) {
            const branchLen = random(8, 30);
            const branchSeg = int(branchLen / 4);
            const branchAngleOffset = random([-1, 1]) * random(0.4, 1.2);
            const branchAnimPhase = random(TWO_PI);
            const branchAnimSpeed = random(0.8, 1.6);
            
            let bCurvatureTheta = random(-0.25, 0.25);
            let bCurvaturePhi = random(-0.25, 0.25);
            const branchSegments = [];
            for (let bs = 0; bs < branchSeg; bs++) {
              const t2 = bs / branchSeg;
              bCurvatureTheta += random(-0.12, 0.12);
              bCurvatureTheta = constrain(bCurvatureTheta, -0.35, 0.35);
              bCurvaturePhi += random(-0.12, 0.12);
              bCurvaturePhi = constrain(bCurvaturePhi, -0.35, 0.35);
              
              const branchCurvatureIntensity = pow(t2, 1.2) * curvatureMultiplier;
              const branchBaseCurvTheta = bCurvatureTheta + random(-0.18, 0.18);
              const branchBaseCurvPhi = bCurvaturePhi + random(-0.18, 0.18);
              const branchCurvTheta = branchBaseCurvTheta * (0.4 + branchCurvatureIntensity * 1.2);
              const branchCurvPhi = branchBaseCurvPhi * (0.4 + branchCurvatureIntensity * 1.2);
              
              const branchTheta = currentTheta + branchAngleOffset + branchCurvTheta;
              const branchPhi = currentPhi + branchCurvPhi;
              const branchDirX3D = sin(branchPhi) * cos(branchTheta);
              const branchDirY3D = sin(branchPhi) * sin(branchTheta);
              const branchDirZ3D = cos(branchPhi);
              
              branchSegments.push({
                t: t2,
                curvatureTheta: branchCurvTheta,
                curvaturePhi: branchCurvPhi,
                dirX: branchDirX3D,
                dirY: branchDirY3D,
                dirZ: branchDirZ3D
              });
            }
            
            branches.push({
              segmentIndex: s,
              length: branchLen,
              segments: branchSegments,
              angleOffset: branchAngleOffset,
              animPhase: branchAnimPhase,
              animSpeed: branchAnimSpeed,
              isSecondary: true,
              hasDroplet: false
            });
          }
        }

        splatterData.rays.push({
          theta, phi, // Spherical coordinates for initial direction
          length: len,
          segments: raySegments,
          branches,
          baseWidth,
          endWidth,
          widthVariation,
          animSpeed,
          animPhase,
          animAmplitude
        });
      }

      // Collect all branch points for droplet spawning
      const branchPoints = collectBranchPoints(splatterData, cx, cy);
      
      // Generate droplets data - spawn near branches with high probability
      const dropletCount = int(200 + 500 * density);
      splatterData.droplets = [];
      splatterData.dropletConnections = []; // Store connections for deterministic drawing
      
      for (let i = 0; i < dropletCount; i++) {
        let x, y, z, size, branchInfo = null;
        
        // High probability (0.7) to spawn near a branch, low (0.3) to spawn randomly in 3D space
        if (branchPoints.length > 0 && random() < 0.7) {
          // Spawn near a branch in 3D space
          const branchPoint = random(branchPoints);
          branchInfo = branchPoint;
          
          // Distance from branch - minimum distance to avoid being ON the branch
          // Use distribution that favors closer distances (denser near branch)
          const minDist = 8; // Minimum distance (must be outside branch)
          const maxDist = 45;
          
          // Distribution: higher probability for closer distances (inverse of original)
          // Use 1 - pow to favor closer distances
          const distT = 1 - pow(random(0, 0.7), 2.0); // Favor closer distances (0.3 to 1.0 range, squared)
          const dist = lerp(minDist, maxDist, distT);
          const distRatio = (dist - minDist) / (maxDist - minDist); // 0 = close, 1 = far
          
          // Get branch direction
          const dirX = branchPoint.dirX;
          const dirY = branchPoint.dirY;
          const dirZ = branchPoint.dirZ;
          
          // Create perpendicular plane to branch direction
          // First, find a vector not parallel to branch direction (use a fixed reference)
          let refX = 1, refY = 0, refZ = 0;
          // If branch direction is close to X-axis, use Y-axis as reference
          if (abs(dirX) > 0.9) {
            refX = 0; refY = 1; refZ = 0;
          }
          
          // Cross product: ref × dir to get first perpendicular vector
          let perp1X = refY * dirZ - refZ * dirY;
          let perp1Y = refZ * dirX - refX * dirZ;
          let perp1Z = refX * dirY - refY * dirX;
          let perp1Len = sqrt(perp1X * perp1X + perp1Y * perp1Y + perp1Z * perp1Z);
          
          // Normalize first perpendicular
          if (perp1Len > 0.001) {
            perp1X /= perp1Len;
            perp1Y /= perp1Len;
            perp1Z /= perp1Len;
          } else {
            // Fallback: use Y-axis
            perp1X = 0; perp1Y = 1; perp1Z = 0;
          }
          
          // Second perpendicular: dir × perp1 (completes the perpendicular plane)
          let perp2X = dirY * perp1Z - dirZ * perp1Y;
          let perp2Y = dirZ * perp1X - dirX * perp1Z;
          let perp2Z = dirX * perp1Y - dirY * perp1X;
          let perp2Len = sqrt(perp2X * perp2X + perp2Y * perp2Y + perp2Z * perp2Z);
          
          // Normalize second perpendicular
          if (perp2Len > 0.001) {
            perp2X /= perp2Len;
            perp2Y /= perp2Len;
            perp2Z /= perp2Len;
          } else {
            // Fallback: use Z-axis
            perp2X = 0; perp2Y = 0; perp2Z = 1;
          }
          
          // Random angle around branch direction (on the perpendicular plane)
          const rotAngle = random(TWO_PI);
          const cosAngle = cos(rotAngle);
          const sinAngle = sin(rotAngle);
          
          // Position on perpendicular plane (mostly perpendicular, slight variation along branch)
          const perpX = perp1X * cosAngle + perp2X * sinAngle;
          const perpY = perp1Y * cosAngle + perp2Y * sinAngle;
          const perpZ = perp1Z * cosAngle + perp2Z * sinAngle;
          
          // Small variation along branch direction (like original 2D: slight forward/back)
          const alongBranchVar = random(-dist * 0.3, dist * 0.3);
          
          // Position droplet: branchPoint + perpendicular offset + small along-branch offset
          x = branchPoint.x + perpX * dist + dirX * alongBranchVar;
          y = branchPoint.y + perpY * dist + dirY * alongBranchVar;
          z = branchPoint.z + perpZ * dist + dirZ * alongBranchVar;
          
          branchInfo = {
            ...branchPoint,
            offsetX: x - branchPoint.x,
            offsetY: y - branchPoint.y,
            offsetZ: z - branchPoint.z
          };
          
          const maxSize = 3.5;
          const minSize = 0.8;
          size = lerp(maxSize, minSize, distRatio) * random(0.8, 1.2);
        } else {
          // Spawn randomly in 3D space around the sphere
          const sphereRadius = random(30, maxLen + 100);
          // Uniform distribution on sphere surface using spherical coordinates
          const dropTheta = random(TWO_PI);
          const dropPhi = acos(random(-1, 1));
          
          x = cx + sin(dropPhi) * cos(dropTheta) * sphereRadius;
          y = cy + sin(dropPhi) * sin(dropTheta) * sphereRadius;
          z = cos(dropPhi) * sphereRadius;
          
          size = random(0.5, 2);
        }
        
        const alpha = random(80, 220);
        const sizeVariation = random(0.7, 1.4);
        
        splatterData.droplets.push({ 
          x, y, z, size, alpha, sizeVariation,
          branchInfo
        });
      }
      
      // Pre-generate droplet connections (deterministic, stored once)
      generateDropletConnections(splatterData, cx, cy);

      // Reset random seed after generation (for any non-deterministic operations)
      randomSeed();
      
      // Draw the splatter
      background(245);
      drawSplatter(splatterData, 0);
    }

    // Transform 3D coordinates with rotation around y-axis and perspective projection
    function transform3D(x, y, z, centerX, centerY) {
      if (!is3DMode) return { x, y, z: 0, scale: 1 };
      
      // Convert to coordinate system centered at splatter center
      const relX = x - centerX;
      const relY = y - centerY;
      
      // Rotate around y-axis (horizontal axis through center)
      // Rotation matrix around y-axis:
      // x' = x*cos - z*sin
      // y' = y
      // z' = x*sin + z*cos
      const cosR = cos(rotation3D);
      const sinR = sin(rotation3D);
      
      const rotatedX = relX * cosR - z * sinR;
      const rotatedY = relY;
      const rotatedZ = relX * sinR + z * cosR;
      
      // Perspective projection: project 3D to 2D
      const perspective = 1200; // Perspective distance (larger = less perspective distortion)
      const scale = perspective / (perspective + rotatedZ);
      
      // Apply perspective scaling
      const projectedX = rotatedX * scale;
      const projectedY = rotatedY * scale;
      
      // Convert back to screen coordinates
      return {
        x: centerX + projectedX,
        y: centerY + projectedY,
        z: rotatedZ,
        scale: scale
      };
    }

    function drawSplatter(data, time) {
      const { cx, cy, mainBlotRadius, droplets, rays } = data;
      const branchThickness = parseFloat(branchThicknessSlider.value);

      // Slight paper tint
      noStroke();
      fill(245, 245, 245, 50);
      rect(0, 0, width, height);

      // Draw central splatter that bulges toward branches
      drawCentralSplatter(data, cx, cy, time);

      // Draw rays with animation in 3D space
      let branchGlobalIdx = 0;
      for (let rayIdx = 0; rayIdx < rays.length; rayIdx++) {
        const ray = rays[rayIdx];
        const { theta, phi, length, segments: raySegments, branches, baseWidth, endWidth, widthVariation, animSpeed, animPhase, animAmplitude } = ray;
        const segCount = raySegments.length;
        
        // Start at center in 3D space
        let x3D = 0;
        let y3D = 0;
        let z3D = 0;
        const segLength = length / segCount;

        for (let s = 0; s < segCount; s++) {
          const seg = raySegments[s];
          const t = seg.t;
          
          // Get 3D direction from segment (with animation sway)
          let dirX = seg.dirX;
          let dirY = seg.dirY;
          let dirZ = seg.dirZ;
          
          // Add oscillating sway in 3D (perpendicular to direction)
          const baseSway = sin(time * animSpeed + animPhase) * animAmplitude * 0.3;
          const positionSway = sin(time * animSpeed * 0.7 + animPhase + t * 3) * animAmplitude * (0.2 + t * 0.8);
          const sway = baseSway + positionSway;
          
          // Create perpendicular vectors for sway (in 3D)
          // Use cross product to get perpendicular direction
          const perpX = dirY;
          const perpY = -dirX;
          const perpZ = 0;
          const perpLen = sqrt(perpX * perpX + perpY * perpY + perpZ * perpZ);
          if (perpLen > 0.001) {
            dirX += (perpX / perpLen) * sway * 0.3;
            dirY += (perpY / perpLen) * sway * 0.3;
          }
          
          // Normalize direction
          const dirLen = sqrt(dirX * dirX + dirY * dirY + dirZ * dirZ);
          if (dirLen > 0.001) {
            dirX /= dirLen;
            dirY /= dirLen;
            dirZ /= dirLen;
          }

          // Calculate next position in 3D space
          const nextX3D = x3D + dirX * segLength;
          const nextY3D = y3D + dirY * segLength;
          const nextZ3D = z3D + dirZ * segLength;

          // Parent branches grow MORE relative to child branches (1.25x multiplier)
          const parentThickness = branchThickness * 1.25;
          const w = lerp(baseWidth * widthVariation, endWidth, t) * seg.widthVar * parentThickness;
          
          // Transform 3D coordinates to screen space
          const t1 = transform3D(cx + x3D, cy + y3D, z3D, cx, cy);
          const t2 = transform3D(cx + nextX3D, cy + nextY3D, nextZ3D, cx, cy);
          const scale3D = (t1.scale || 1) * (t2.scale || 1);
          const alphaScale = is3DMode ? scale3D : 1;
          
          stroke(0, 0, 0, (220 - t * 120) * alphaScale);
          strokeWeight(w * (t1.scale || 1));
          line(t1.x, t1.y, t2.x, t2.y);

          // Draw branches from this segment
          for (let branch of branches) {
            if (branch.segmentIndex === s) {
              drawBranch3D(x3D, y3D, z3D, dirX, dirY, dirZ, branch, w, time, branchThickness, branchGlobalIdx, cx, cy);
              branchGlobalIdx++;
            }
          }

          x3D = nextX3D;
          y3D = nextY3D;
          z3D = nextZ3D;
        }
      }

      // Calculate animated droplet positions first (for connections) in 3D space
      const animatedDroplets = droplets.map(drop => {
        let drawX = drop.x;
        let drawY = drop.y;
        let drawZ = drop.z || 0;
        
        // Animate droplet if it's linked to a branch
        if (drop.branchInfo) {
          // Calculate the animated branch position at current time in 3D
          const animBranchPos = calculateAnimatedBranchPosition3D(drop.branchInfo, time, data, cx, cy);
          
          if (animBranchPos) {
            // Use 3D offset directly (offset already in 3D space)
            drawX = animBranchPos.x + (drop.branchInfo.offsetX || 0);
            drawY = animBranchPos.y + (drop.branchInfo.offsetY || 0);
            drawZ = animBranchPos.z + (drop.branchInfo.offsetZ || 0);
            
            // Add slight flow in branch direction (3D)
            const flowSpeed = 0.12;
            const flowDist = time * flowSpeed;
            drawX += animBranchPos.dirX * flowDist;
            drawY += animBranchPos.dirY * flowDist;
            drawZ += animBranchPos.dirZ * flowDist;
          }
        }
        
        return { ...drop, animatedX: drawX, animatedY: drawY, animatedZ: drawZ };
      });

      // Draw droplet connections (Voronoi-like network) using animated positions
      drawDropletConnections(data.dropletConnections || [], animatedDroplets, cx, cy);

      // Draw droplets (animated if linked to branch) - sort by z-depth for proper rendering
      const sortedDroplets = [...animatedDroplets].sort((a, b) => {
        // Sort by z-depth (back to front for proper rendering)
        if (!is3DMode) return 0;
        const tA = transform3D(a.animatedX, a.animatedY, a.animatedZ || a.z || 0, cx, cy);
        const tB = transform3D(b.animatedX, b.animatedY, b.animatedZ || b.z || 0, cx, cy);
        return (tB.z || 0) - (tA.z || 0); // Back to front
      });
      
      for (let animatedDrop of sortedDroplets) {
        const tDrop = transform3D(animatedDrop.animatedX, animatedDrop.animatedY, animatedDrop.animatedZ || animatedDrop.z || 0, cx, cy);
        const scaleDrop = tDrop.scale || 1;
        noStroke();
        fill(0, 0, 0, animatedDrop.alpha * scaleDrop);
        ellipse(tDrop.x, tDrop.y, animatedDrop.size * scaleDrop, animatedDrop.size * animatedDrop.sizeVariation * scaleDrop);
      }
    }

    function drawCentralSplatter(data, cx, cy, time) {
      const { rays, mainBlotRadius } = data;
      
      // Collect branch attachment points in 3D space (where branches connect to center/rays)
      const attachmentPoints = [];
      
      // For each ray, get the first few segment positions in 3D (near the center)
      for (let rayIdx = 0; rayIdx < rays.length; rayIdx++) {
        const ray = rays[rayIdx];
        const { theta, phi, length, segments: raySegments } = ray;
        const segLength = length / raySegments.length;
        
        let x3D = 0;
        let y3D = 0;
        let z3D = 0;
        
        // Get position at first few segments to create bulges (closer to center)
        for (let s = 0; s < min(6, raySegments.length); s++) {
          const seg = raySegments[s];
          const t = seg.t;
          
          let dirX = seg.dirX;
          let dirY = seg.dirY;
          let dirZ = seg.dirZ;
          
          // Add sway animation
          const baseSway = sin(time * ray.animSpeed + ray.animPhase) * ray.animAmplitude * 0.3;
          const positionSway = sin(time * ray.animSpeed * 0.7 + ray.animPhase + t * 3) * ray.animAmplitude * (0.2 + t * 0.8);
          const sway = baseSway + positionSway;
          
          const perpX = dirY;
          const perpY = -dirX;
          const perpZ = 0;
          const perpLen = sqrt(perpX * perpX + perpY * perpY + perpZ * perpZ);
          if (perpLen > 0.001) {
            dirX += (perpX / perpLen) * sway * 0.3;
            dirY += (perpY / perpLen) * sway * 0.3;
          }
          
          const dirLen = sqrt(dirX * dirX + dirY * dirY + dirZ * dirZ);
          if (dirLen > 0.001) {
            dirX /= dirLen;
            dirY /= dirLen;
            dirZ /= dirLen;
          }
          
          x3D += dirX * segLength;
          y3D += dirY * segLength;
          z3D += dirZ * segLength;
          
          // Only use points close to center for bulging
          const distFromCenter = sqrt(x3D * x3D + y3D * y3D + z3D * z3D);
          if (distFromCenter < mainBlotRadius * 2 && (s === 0 || s === 2 || s === 4)) {
            attachmentPoints.push({ 
              x: cx + x3D, y: cy + y3D, z: z3D,
              x3D, y3D, z3D, // Store 3D position relative to center
              dist: distFromCenter
            });
          }
        }
        
        // Also get branch attachment points in 3D
        for (let branch of ray.branches) {
          if (branch.segmentIndex < 6) {
            // Calculate position at branch attachment in 3D
            let bx3D = 0;
            let by3D = 0;
            let bz3D = 0;
            
            for (let s = 0; s <= branch.segmentIndex; s++) {
              const seg = raySegments[s];
              const t = seg.t;
              
              let dirX = seg.dirX;
              let dirY = seg.dirY;
              let dirZ = seg.dirZ;
              
              const baseSway = sin(time * ray.animSpeed + ray.animPhase) * ray.animAmplitude * 0.3;
              const positionSway = sin(time * ray.animSpeed * 0.7 + ray.animPhase + t * 3) * ray.animAmplitude * (0.2 + t * 0.8);
              const sway = baseSway + positionSway;
              
              const perpX = dirY;
              const perpY = -dirX;
              const perpLen = sqrt(perpX * perpX + perpY * perpY);
              if (perpLen > 0.001) {
                dirX += (perpX / perpLen) * sway * 0.3;
                dirY += (perpY / perpLen) * sway * 0.3;
              }
              
              const dirLen = sqrt(dirX * dirX + dirY * dirY + dirZ * dirZ);
              if (dirLen > 0.001) {
                dirX /= dirLen;
                dirY /= dirLen;
                dirZ /= dirLen;
              }
              
              bx3D += dirX * segLength;
              by3D += dirY * segLength;
              bz3D += dirZ * segLength;
            }
            
            const distFromCenter = sqrt(bx3D * bx3D + by3D * by3D + bz3D * bz3D);
            if (distFromCenter < mainBlotRadius * 2) {
              attachmentPoints.push({ 
                x: cx + bx3D, y: cy + by3D, z: bz3D,
                x3D: bx3D, y3D: by3D, z3D: bz3D,
                dist: distFromCenter
              });
            }
          }
        }
      }
      
      // Draw 3D sphere with bulges toward attachment points
      noStroke();
      fill(0, 0, 0, 240);
      
      // Generate outline points of the 3D sphere from current viewing angle
      // For each angle around the center (in screen space), find the farthest point on the sphere
      const numPoints = 50;
      const outlinePoints = [];
      
      // Pre-generate sphere points for efficiency
      const numLat = 40;
      const numLon = 40;
      const spherePoints = [];
      
      for (let lat = 0; lat <= numLat; lat++) {
        const phi = (lat / numLat) * PI; // 0 to PI
        const sinPhi = sin(phi);
        const cosPhi = cos(phi);
        
        for (let lon = 0; lon <= numLon; lon++) {
          const theta = (lon / numLon) * TWO_PI; // 0 to 2PI
          
          // Base sphere radius
          let radius = mainBlotRadius;
          
          // Calculate 3D direction from center
          const dirX = sinPhi * cos(theta);
          const dirY = sinPhi * sin(theta);
          const dirZ = cosPhi;
          
          // Bulge toward attachment points
          for (let att of attachmentPoints) {
            // Calculate direction to attachment point (normalized)
            const attDist3D = sqrt(att.x3D * att.x3D + att.y3D * att.y3D + att.z3D * att.z3D);
            if (attDist3D > 0.001) {
              const attDirX = att.x3D / attDist3D;
              const attDirY = att.y3D / attDist3D;
              const attDirZ = att.z3D / attDist3D;
              
              // Dot product to find angle between directions
              const dot = dirX * attDirX + dirY * attDirY + dirZ * attDirZ;
              const angleDiff = acos(constrain(dot, -1, 1));
              
              // Create bulge if attachment point is in this direction
              if (angleDiff < PI / 3) { // Within 60 degrees
                const bulgeStrength = pow(1 - (angleDiff / (PI / 3)), 1.5); // Smooth falloff
                const bulgeSize = map(att.dist, 0, mainBlotRadius * 1.5, mainBlotRadius * 0.8, mainBlotRadius * 0.3);
                radius = max(radius, mainBlotRadius + bulgeSize * bulgeStrength);
              }
            }
          }
          
          // Add organic variation
          const variationSeed = floor((theta * 1000 + phi * 1000) % 1000);
          randomSeed(variationSeed);
          const variation = 0.92 + random(0, 0.16);
          randomSeed();
          radius *= variation;
          
          // Calculate 3D position (centered at origin)
          const x3D = dirX * radius;
          const y3D = dirY * radius;
          const z3D = dirZ * radius;
          
          // Transform to screen space and store
          const t = transform3D(cx + x3D, cy + y3D, z3D, cx, cy);
          spherePoints.push({ x: t.x, y: t.y, x3D, y3D, z3D });
        }
      }
      
      // For each screen angle, find the farthest point
      for (let i = 0; i < numPoints; i++) {
        const screenAngle = (i / numPoints) * TWO_PI;
        const screenDirX = cos(screenAngle);
        const screenDirY = sin(screenAngle);
        
        let maxDist = -Infinity;
        let bestPoint = null;
        
        for (let point of spherePoints) {
          const dx = point.x - cx;
          const dy = point.y - cy;
          const dist = sqrt(dx * dx + dy * dy);
          
          if (dist > 0.001) {
            // Check if point is in the right direction
            const pointAngle = atan2(dy, dx);
            let angleDiff = screenAngle - pointAngle;
            while (angleDiff > PI) angleDiff -= TWO_PI;
            while (angleDiff < -PI) angleDiff += TWO_PI;
            
            // Use dot product to find projection distance in screen angle direction
            const projDist = dx * screenDirX + dy * screenDirY;
            
            if (abs(angleDiff) < PI / numPoints * 3 && projDist > maxDist) {
              maxDist = projDist;
              bestPoint = { x: point.x, y: point.y };
            }
          }
        }
        
        if (bestPoint) {
          outlinePoints.push(bestPoint);
        } else {
          // Fallback
          outlinePoints.push({
            x: cx + cos(screenAngle) * mainBlotRadius,
            y: cy + sin(screenAngle) * mainBlotRadius
          });
        }
      }
      
      // Draw filled shape using outline points
      beginShape();
      for (let point of outlinePoints) {
        vertex(point.x, point.y);
      }
      endShape(CLOSE);
    }

    function collectBranchPoints(splatterData, cx, cy) {
      const { rays } = splatterData;
      const branchPoints = [];
      
      // Collect points along all branches (rays and sub-branches) in 3D space
      for (let rayIdx = 0; rayIdx < rays.length; rayIdx++) {
        const ray = rays[rayIdx];
        const { theta, phi, length, segments: raySegments } = ray;
        const segLength = length / raySegments.length;
        
        let x3D = 0;
        let y3D = 0;
        let z3D = 0;
        
        // Collect points along main ray in 3D
        for (let s = 0; s < raySegments.length; s++) {
          const seg = raySegments[s];
          const dirX = seg.dirX;
          const dirY = seg.dirY;
          const dirZ = seg.dirZ;
          
          x3D += dirX * segLength;
          y3D += dirY * segLength;
          z3D += dirZ * segLength;
          
          // Add point along ray (sample every few segments)
          if (s % 2 === 0) {
            branchPoints.push({
              x: cx + x3D, y: cy + y3D, z: z3D,
              dirX, dirY, dirZ, // 3D direction
              animSpeed: ray.animSpeed,
              animPhase: ray.animPhase,
              animAmplitude: ray.animAmplitude,
              type: 'ray',
              rayIdx: rayIdx,
              segmentIdx: s,
              t: seg.t
            });
          }
          
          // Add branch points in 3D
          for (let branchIdx = 0; branchIdx < ray.branches.length; branchIdx++) {
            const branch = ray.branches[branchIdx];
            if (branch.segmentIndex === s) {
              let bx3D = x3D;
              let by3D = y3D;
              let bz3D = z3D;
              const branchSegLen = branch.isSecondary ? 3 : 4;
              
              for (let bs = 0; bs < branch.segments.length; bs++) {
                const branchSeg = branch.segments[bs];
                bx3D += branchSeg.dirX * branchSegLen;
                by3D += branchSeg.dirY * branchSegLen;
                bz3D += branchSeg.dirZ * branchSegLen;
                
                // Add point along branch
                if (bs % 2 === 0 || bs === branch.segments.length - 1) {
                  branchPoints.push({
                    x: cx + bx3D, y: cy + by3D, z: bz3D,
                    dirX: branchSeg.dirX,
                    dirY: branchSeg.dirY,
                    dirZ: branchSeg.dirZ,
                    animSpeed: branch.animSpeed,
                    animPhase: branch.animPhase,
                    animAmplitude: 0.2,
                    type: 'branch',
                    rayIdx: rayIdx,
                    branchIdx: branchIdx,
                    segmentIdx: s,
                    branchSegmentIdx: bs,
                    t: branchSeg.t,
                    isSecondary: branch.isSecondary
                  });
                }
              }
            }
          }
        }
      }
      
      return branchPoints;
    }
    
    function calculateAnimatedBranchPosition3D(branchInfo, time, splatterData, cx, cy) {
      if (!branchInfo) return null;
      
      const { rays } = splatterData;
      
      if (branchInfo.type === 'ray') {
        // Calculate animated ray position in 3D (matching drawSplatter logic)
        const ray = rays[branchInfo.rayIdx];
        const { theta, phi, length, segments: raySegments } = ray;
        const segLength = length / raySegments.length;
        
        let x3D = 0;
        let y3D = 0;
        let z3D = 0;
        
        for (let s = 0; s <= branchInfo.segmentIdx; s++) {
          const seg = raySegments[s];
          const t = seg.t;
          
          let dirX = seg.dirX;
          let dirY = seg.dirY;
          let dirZ = seg.dirZ;
          
          // Add sway animation
          const baseSway = sin(time * ray.animSpeed + ray.animPhase) * ray.animAmplitude * 0.3;
          const positionSway = sin(time * ray.animSpeed * 0.7 + ray.animPhase + t * 3) * ray.animAmplitude * (0.2 + t * 0.8);
          const sway = baseSway + positionSway;
          
          const perpX = dirY;
          const perpY = -dirX;
          const perpZ = 0;
          const perpLen = sqrt(perpX * perpX + perpY * perpY + perpZ * perpZ);
          if (perpLen > 0.001) {
            dirX += (perpX / perpLen) * sway * 0.3;
            dirY += (perpY / perpLen) * sway * 0.3;
          }
          
          const dirLen = sqrt(dirX * dirX + dirY * dirY + dirZ * dirZ);
          if (dirLen > 0.001) {
            dirX /= dirLen;
            dirY /= dirLen;
            dirZ /= dirLen;
          }
          
          x3D += dirX * segLength;
          y3D += dirY * segLength;
          z3D += dirZ * segLength;
          
          if (s === branchInfo.segmentIdx) {
            return { x: cx + x3D, y: cy + y3D, z: z3D, dirX, dirY, dirZ };
          }
        }
      } else if (branchInfo.type === 'branch') {
        // Calculate animated branch position in 3D
        const ray = rays[branchInfo.rayIdx];
        const branch = ray.branches[branchInfo.branchIdx];
        const { theta, phi, length, segments: raySegments } = ray;
        const segLength = length / raySegments.length;
        
        // First get to parent segment in 3D
        let x3D = 0;
        let y3D = 0;
        let z3D = 0;
        
        for (let s = 0; s <= branchInfo.segmentIdx; s++) {
          const seg = raySegments[s];
          const t = seg.t;
          let dirX = seg.dirX;
          let dirY = seg.dirY;
          let dirZ = seg.dirZ;
          
          const baseSway = sin(time * ray.animSpeed + ray.animPhase) * ray.animAmplitude * 0.3;
          const positionSway = sin(time * ray.animSpeed * 0.7 + ray.animPhase + t * 3) * ray.animAmplitude * (0.2 + t * 0.8);
          const sway = baseSway + positionSway;
          
          const perpX = dirY;
          const perpY = -dirX;
          const perpLen = sqrt(perpX * perpX + perpY * perpY);
          if (perpLen > 0.001) {
            dirX += (perpX / perpLen) * sway * 0.3;
            dirY += (perpY / perpLen) * sway * 0.3;
          }
          
          const dirLen = sqrt(dirX * dirX + dirY * dirY + dirZ * dirZ);
          if (dirLen > 0.001) {
            dirX /= dirLen;
            dirY /= dirLen;
            dirZ /= dirLen;
          }
          
          x3D += dirX * segLength;
          y3D += dirY * segLength;
          z3D += dirZ * segLength;
        }
        
        // Now traverse the branch in 3D
        const branchSegLen = branchInfo.isSecondary ? 3 : 4;
        
        for (let bs = 0; bs <= branchInfo.branchSegmentIdx; bs++) {
          const branchSeg = branch.segments[bs];
          const t2 = branchSeg.t;
          
          let dirX = branchSeg.dirX;
          let dirY = branchSeg.dirY;
          let dirZ = branchSeg.dirZ;
          
          const branchBaseSway = sin(time * branch.animSpeed * 1.5 + branch.animPhase) * 0.2;
          const branchTipSway = branchBaseSway * (1 + t2 * 0.6);
          const sway = branchTipSway;
          
          const perpX = dirY;
          const perpY = -dirX;
          const perpLen = sqrt(perpX * perpX + perpY * perpY);
          if (perpLen > 0.001) {
            dirX += (perpX / perpLen) * sway * 0.3;
            dirY += (perpY / perpLen) * sway * 0.3;
          }
          
          const dirLen = sqrt(dirX * dirX + dirY * dirY + dirZ * dirZ);
          if (dirLen > 0.001) {
            dirX /= dirLen;
            dirY /= dirLen;
            dirZ /= dirLen;
          }
          
          x3D += dirX * branchSegLen;
          y3D += dirY * branchSegLen;
          z3D += dirZ * branchSegLen;
          
          if (bs === branchInfo.branchSegmentIdx) {
            return { x: cx + x3D, y: cy + y3D, z: z3D, dirX, dirY, dirZ };
          }
        }
      }
      
      return null;
    }

    // Simple Delaunay triangulation to avoid crossing lines
    function generateDropletConnections(splatterData, centerX, centerY) {
      const { droplets } = splatterData;
      const connections = [];
      
      // For each droplet, find its nearest neighbors in 3D space
      // Simple approach: connect to nearest 3-6 neighbors based on 3D Euclidean distance
      for (let i = 0; i < droplets.length; i++) {
        const drop1 = droplets[i];
        
        // Find distances to all other droplets in 3D space
        const distances = [];
        for (let j = 0; j < droplets.length; j++) {
          if (i === j) continue;
          const drop2 = droplets[j];
          const dx = drop2.x - drop1.x;
          const dy = drop2.y - drop1.y;
          const dz = (drop2.z || 0) - (drop1.z || 0);
          // Calculate 3D Euclidean distance
          const dist = sqrt(dx * dx + dy * dy + dz * dz);
          distances.push({ index: j, dist, dx, dy, dz });
        }
        
        // Sort by 3D distance
        distances.sort((a, b) => a.dist - b.dist);
        
        // Connect to nearest neighbors (3-6 connections per droplet)
        const maxConnections = min(6, distances.length);
        const neighborCount = int(random(3, maxConnections + 1));
        
        for (let n = 0; n < neighborCount; n++) {
          const neighbor = distances[n];
          const j = neighbor.index;
          
          // Check if connection already exists (avoid duplicates)
          const exists = connections.some(c => 
            (c.drop1Index === i && c.drop2Index === j) ||
            (c.drop1Index === j && c.drop2Index === i)
          );
          
          if (!exists) {
            // Calculate midpoint in 3D space
            const midX = (drop1.x + droplets[j].x) / 2;
            const midY = (drop1.y + droplets[j].y) / 2;
            const midZ = ((drop1.z || 0) + (droplets[j].z || 0)) / 2;
            // Distance from center in 3D
            const distFromCenter = sqrt((midX - centerX) ** 2 + (midY - centerY) ** 2 + midZ ** 2);
            const maxDist = 500;
            const thicknessFactor = map(constrain(distFromCenter, 0, maxDist), maxDist, 0, 0.3, 1.5);
            
            // Generate curved path points in 3D space (for organic, meandering path)
            const pathPoints = generateCurvedPath3D(drop1.x, drop1.y, drop1.z || 0, droplets[j].x, droplets[j].y, droplets[j].z || 0, i, j);
            
            // Generate branches
            const branchCount = int(random(2, 5));
            const branches = [];
            for (let b = 0; b < branchCount; b++) {
              const t = random(0.2, 0.8);
              const branchAngleOffset = random(-0.4, 0.4);
              const branchLen = random(3, 12);
              const branchThicknessMult = random(0.6, 1.0);
              const hasSubBranch = random() < 0.3;
              let subBranch = null;
              
              if (hasSubBranch) {
                const subBranchAngleOffset = random([-1, 1]) * random(0.3, 0.6);
                const subBranchLen = branchLen * random(0.3, 0.6);
                subBranch = { angleOffset: subBranchAngleOffset, len: subBranchLen };
              }
              
              branches.push({
                t,
                angleOffset: branchAngleOffset,
                len: branchLen,
                thicknessMult: branchThicknessMult,
                subBranch
              });
            }
            
            connections.push({
              drop1Index: i,
              drop2Index: j,
              thicknessFactor,
              branches,
              pathPoints
            });
          }
        }
      }
      
      splatterData.dropletConnections = connections;
    }
    
    function generateCurvedPath3D(x1, y1, z1, x2, y2, z2, seed1, seed2) {
      // Generate an organic, meandering path in 3D space
      const points = [];
      const segments = 8 + int(random(4)); // 8-12 segments for smooth curve
      
      // Calculate 3D distance and direction
      const dx = x2 - x1;
      const dy = y2 - y1;
      const dz = z2 - z1;
      const dist = sqrt(dx * dx + dy * dy + dz * dz);
      
      if (dist < 0.001) {
        // Points are too close, return simple path
        return [{ x: x1, y: y1, z: z1 }, { x: x2, y: y2, z: z2 }];
      }
      
      // Normalize direction vector
      const dirX = dx / dist;
      const dirY = dy / dist;
      const dirZ = dz / dist;
      
      // Use seeds for deterministic randomness
      randomSeed(seed1 * 1000 + seed2);
      
      points.push({ x: x1, y: y1, z: z1 });
      
      let currentX = x1;
      let currentY = y1;
      let currentZ = z1;
      const segLen = dist / segments;
      
      // Create perpendicular vectors for curvature (perpendicular to direction)
      let perp1X = 1, perp1Y = 0, perp1Z = 0;
      if (abs(dirX) > 0.9) {
        perp1X = 0; perp1Y = 1; perp1Z = 0;
      }
      
      // Cross product: perp1 × dir
      let cross1X = perp1Y * dirZ - perp1Z * dirY;
      let cross1Y = perp1Z * dirX - perp1X * dirZ;
      let cross1Z = perp1X * dirY - perp1Y * dirX;
      let cross1Len = sqrt(cross1X * cross1X + cross1Y * cross1Y + cross1Z * cross1Z);
      if (cross1Len > 0.001) {
        cross1X /= cross1Len;
        cross1Y /= cross1Len;
        cross1Z /= cross1Len;
      } else {
        cross1X = 0; cross1Y = 1; cross1Z = 0;
      }
      
      // Second perpendicular: dir × cross1
      let cross2X = dirY * cross1Z - dirZ * cross1Y;
      let cross2Y = dirZ * cross1X - dirX * cross1Z;
      let cross2Z = dirX * cross1Y - dirY * cross1X;
      let cross2Len = sqrt(cross2X * cross2X + cross2Y * cross2Y + cross2Z * cross2Z);
      if (cross2Len > 0.001) {
        cross2X /= cross2Len;
        cross2Y /= cross2Len;
        cross2Z /= cross2Len;
      } else {
        cross2X = 0; cross2Y = 0; cross2Z = 1;
      }
      
      for (let i = 1; i < segments; i++) {
        const t = i / segments;
        
        // Add curvature variation in perpendicular plane (more curve in middle)
        const curvature = random(-0.4, 0.4) * (1 - abs(t - 0.5) * 2);
        const curvatureAngle = random(TWO_PI);
        const curvX = (cross1X * cos(curvatureAngle) + cross2X * sin(curvatureAngle)) * curvature;
        const curvY = (cross1Y * cos(curvatureAngle) + cross2Y * sin(curvatureAngle)) * curvature;
        const curvZ = (cross1Z * cos(curvatureAngle) + cross2Z * sin(curvatureAngle)) * curvature;
        
        // Add perpendicular drift (wandering path)
        const drift = random(-segLen * 0.3, segLen * 0.3);
        const driftAngle = random(TWO_PI);
        const driftX = (cross1X * cos(driftAngle) + cross2X * sin(driftAngle)) * drift;
        const driftY = (cross1Y * cos(driftAngle) + cross2Y * sin(driftAngle)) * drift;
        const driftZ = (cross1Z * cos(driftAngle) + cross2Z * sin(driftAngle)) * drift;
        
        currentX += dirX * segLen + curvX * segLen + driftX;
        currentY += dirY * segLen + curvY * segLen + driftY;
        currentZ += dirZ * segLen + curvZ * segLen + driftZ;
        
        points.push({ x: currentX, y: currentY, z: currentZ });
      }
      
      points.push({ x: x2, y: y2, z: z2 });
      
      randomSeed(); // Reset seed
      
      return points;
    }

    function drawDropletConnections(connections, animatedDroplets, cx, cy) {
      const baseAlpha = 15; // Very faint
      
      for (let conn of connections) {
        const drop1 = animatedDroplets[conn.drop1Index];
        const drop2 = animatedDroplets[conn.drop2Index];
        
        // Use animated positions
        const x1 = drop1.animatedX;
        const y1 = drop1.animatedY;
        const x2 = drop2.animatedX;
        const y2 = drop2.animatedY;
        
        // Transform to 3D (use z from droplets)
        const z1 = drop1.z || 0;
        const z2 = drop2.z || 0;
        const t1 = transform3D(x1, y1, z1, cx, cy);
        const t2 = transform3D(x2, y2, z2, cx, cy);
        const scale3D = (t1.scale || 1) * (t2.scale || 1);
        
        // Use stored 3D path points (already in 3D space)
        const lineThickness = conn.thicknessFactor * 0.8;
        stroke(0, 0, 0, baseAlpha * scale3D);
        strokeWeight(lineThickness * (t1.scale || 1));
        noFill();
        
        // Use the stored 3D path points (generated during connection creation)
        const pathPoints3D = conn.pathPoints || [];
        
        if (pathPoints3D && pathPoints3D.length > 2) {
          // Draw curved path through all points (transform each 3D point to screen space)
          beginShape();
          for (let point3D of pathPoints3D) {
            const tPoint3D = transform3D(point3D.x, point3D.y, point3D.z, cx, cy);
            vertex(tPoint3D.x, tPoint3D.y);
          }
          endShape();
          
          // Draw branches along the curved path
          for (let branch of conn.branches) {
            // Find point along path at branch.t
            const pathIndex = int(branch.t * (pathPoints3D.length - 1));
            const pathPoint3D = pathPoints3D[pathIndex];
            const tPathPoint = transform3D(pathPoint3D.x, pathPoint3D.y, pathPoint3D.z, cx, cy);
            
            // Calculate angle at this point (tangent to path) - use transformed points
            let tangentAngle;
            if (pathIndex < pathPoints3D.length - 1) {
              const nextPoint3D = pathPoints3D[pathIndex + 1];
              const tNextPoint = transform3D(nextPoint3D.x, nextPoint3D.y, nextPoint3D.z, cx, cy);
              tangentAngle = atan2(tNextPoint.y - tPathPoint.y, tNextPoint.x - tPathPoint.x);
            } else {
              const prevPoint3D = pathPoints3D[pathIndex - 1];
              const tPrevPoint = transform3D(prevPoint3D.x, prevPoint3D.y, prevPoint3D.z, cx, cy);
              tangentAngle = atan2(tPathPoint.y - tPrevPoint.y, tPathPoint.x - tPrevPoint.x);
            }
            
            const branchAngle = tangentAngle + PI / 2 + branch.angleOffset;
            const branchThickness = lineThickness * 0.4 * branch.thicknessMult * (tPathPoint.scale || 1);
            const branchAlpha = baseAlpha * 0.6 * (tPathPoint.scale || 1);
            
            const branchEndX = tPathPoint.x + cos(branchAngle) * branch.len * (tPathPoint.scale || 1);
            const branchEndY = tPathPoint.y + sin(branchAngle) * branch.len * (tPathPoint.scale || 1);
            
            stroke(0, 0, 0, branchAlpha);
            strokeWeight(branchThickness);
            line(tPathPoint.x, tPathPoint.y, branchEndX, branchEndY);
            
            // Draw sub-branch if exists
            if (branch.subBranch) {
              const subBranchAngle = branchAngle + branch.subBranch.angleOffset;
              stroke(0, 0, 0, branchAlpha * 0.5);
              strokeWeight(branchThickness * 0.5);
              line(branchEndX, branchEndY, 
                   branchEndX + cos(subBranchAngle) * branch.subBranch.len * (tPathPoint.scale || 1), 
                   branchEndY + sin(subBranchAngle) * branch.subBranch.len * (tPathPoint.scale || 1));
            }
          }
        } else {
          // Fallback to straight line if no path points
          line(t1.x, t1.y, t2.x, t2.y);
        }
      }
    }

    function drawBranch3D(startX3D, startY3D, startZ3D, parentDirX, parentDirY, parentDirZ, branch, parentWidth, time, branchThickness = 1, branchGlobalIdx = 0, cx, cy) {
      const { segments: branchSegs, length, animPhase, animSpeed, hasDroplet, dropletSize, isSecondary } = branch;
      
      let bx3D = startX3D;
      let by3D = startY3D;
      let bz3D = startZ3D;
      const segLen = isSecondary ? 3 : 4;

      for (let bs = 0; bs < branchSegs.length; bs++) {
        const seg = branchSegs[bs];
        const segT = seg.t;
        
        // Get 3D direction from branch segment
        let dirX = seg.dirX;
        let dirY = seg.dirY;
        let dirZ = seg.dirZ;
        
        // Add oscillating sway in 3D
        const branchBaseSway = sin(time * animSpeed * 1.5 + animPhase) * 0.2;
        const branchTipSway = branchBaseSway * (1 + segT * 0.6);
        const sway = branchTipSway;
        
        // Apply sway perpendicular to direction
        const perpX = dirY;
        const perpY = -dirX;
        const perpZ = 0;
        const perpLen = sqrt(perpX * perpX + perpY * perpY + perpZ * perpZ);
        if (perpLen > 0.001) {
          dirX += (perpX / perpLen) * sway * 0.3;
          dirY += (perpY / perpLen) * sway * 0.3;
        }
        
        // Normalize direction
        const dirLen = sqrt(dirX * dirX + dirY * dirY + dirZ * dirZ);
        if (dirLen > 0.001) {
          dirX /= dirLen;
          dirY /= dirLen;
          dirZ /= dirLen;
        }

        // Calculate next position in 3D space
        const nx3D = bx3D + dirX * segLen;
        const ny3D = by3D + dirY * segLen;
        const nz3D = bz3D + dirZ * segLen;
        
        // Transform to screen space
        const t1 = transform3D(cx + bx3D, cy + by3D, bz3D, cx, cy);
        const t2Transformed = transform3D(cx + nx3D, cy + ny3D, nz3D, cx, cy);
        const scale3D = (t1.scale || 1) * (t2Transformed.scale || 1);
        
        const bw = lerp(parentWidth * (isSecondary ? 0.4 : 0.5), isSecondary ? 0.3 : 0.4, segT) * branchThickness * (t1.scale || 1);
        strokeWeight(bw);
        stroke(0, 0, 0, ((isSecondary ? 180 : 200) - segT * (isSecondary ? 100 : 120)) * scale3D);
        line(t1.x, t1.y, t2Transformed.x, t2Transformed.y);
        
        bx3D = nx3D;
        by3D = ny3D;
        bz3D = nz3D;
      }

      // Droplet at tip
      if (hasDroplet) {
        const tDrop = transform3D(cx + bx3D, cy + by3D, bz3D, cx, cy);
        const scaleDrop = tDrop.scale || 1;
        noStroke();
        fill(0, 0, 0, 230 * scaleDrop);
        const d = dropletSize * scaleDrop;
        ellipse(tDrop.x, tDrop.y, d, d * 1.05);
      }
    }
